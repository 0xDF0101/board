services:
    nginx:
        image: nginx
        restart: unless-stopped
        ports:
            - '19080:80'
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    board:
        build: .
        env_file:
            - .env
        restart: unless-stopped
    minio:
        image: quay.io/minio/minio
        ports:
            - '9081:9000'
            - '9001:9001'
        volumes:
            - ~/minio-data:/data
        environment:
            MINIO_ROOT_USER: admin
            MINIO_ROOT_PASSWORD: password123
        command: server /data --console-address ":9001"
        restart: unless-stopped
